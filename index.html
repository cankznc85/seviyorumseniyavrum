<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeynep ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        /* Arka Plan Neon Mor Işıltı */
        .bg-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2e0854 0%, #050505 85%);
            z-index: -1; opacity: 0.7;
        }

        /* 1. EKRAN: ŞİFRE GİRİŞİ */
        #password-screen { text-align: center; transition: opacity 0.8s ease; z-index: 20; }
        .lock-icon { font-size: 3.5rem; margin-bottom: 20px; filter: drop-shadow(0 0 15px #9b59b6); }
        input {
            background: rgba(155, 89, 182, 0.05); border: 2px solid #9b59b6;
            padding: 15px; color: #fff; border-radius: 15px;
            font-size: 1.5rem; text-align: center; letter-spacing: 6px;
            width: 240px; outline: none; transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 25px rgba(155, 89, 182, 0.3); }

        /* 2. EKRAN: ANA İÇERİK */
        #main-content { 
            display: none; text-align: center; padding: 25px; 
            max-width: 500px; z-index: 10; opacity: 0; 
        }
        .zeynep-msg { 
            font-size: clamp(1.3rem, 5vw, 2.1rem); font-weight: 600; color: #dcd0ff; 
            line-height: 1.5; margin-bottom: 30px; 
        }
        
        #timer { 
            font-size: 0.85rem; background: rgba(255, 255, 255, 0.03); 
            padding: 25px; border-radius: 25px; 
            border: 1px solid rgba(155, 89, 182, 0.2);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            line-height: 1.8; color: #eee;
        }
        #timer b { color: #9b59b6; font-size: 1.15rem; display: block; margin-bottom: 5px; }

        /* Dokunmatik Kalp Efekti */
        .click-heart {
            position: absolute; pointer-events: none;
            animation: fly 0.8s ease-out forwards;
            font-size: 24px; z-index: 999;
        }
        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.6) rotate(15deg); opacity: 0; }
        }

        /* İçerik Açılış Animasyonu */
        .show { animation: slideUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(50px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body onclick="createHeart(event)">

    <div class="bg-glow"></div>

    <div id="password-screen">
        <div class="lock-icon">🔒</div>
        <p style="letter-spacing: 2px; color: #9b59b6; font-size: 0.8rem; margin-bottom: 20px; font-weight: 600;">ERİŞİM ŞİFRESİNİ GİRİN</p>
        <input type="password" id="passInput" placeholder="••••••••" maxlength="8" autocomplete="off">
    </div>

    <div id="main-content">
        <div style="font-size: 3.5rem; margin-bottom: 20px;">💞</div>
        <div class="zeynep-msg">
            İyi ki varsın yavrum, sadece bugün değil her gün senin günün. Seni çok seviyorum öpüyorum birtanem 💞
        </div>
        <div id="timer"></div>
        <p style="font-size: 0.65rem; opacity: 0.4; margin-top: 30px; letter-spacing: 1px;">(Ekrana dokunmayı dene birtanem...)</p>
    </div>

    <script>
        const passwordScreen = document.getElementById('password-screen');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');

        // Ekrana dokununca kalp çıkması
        function createHeart(e) {
            if (mainContent.style.display === 'block') {
                const heart = document.createElement('div');
                heart.className = 'click-heart';
                heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
                heart.style.left = (e.clientX - 15) + 'px';
                heart.style.top = (e.clientY - 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 800);
            }
        }

        // 4 Ocak Sayacı Fonksiyonu
        function startRelationshipTimer() {
            const relStart = new Date(2026, 0, 4, 0, 0, 0); // 4 Ocak 2026
            
            function update() {
                const now = new Date();
                const diff = now - relStart;
                
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / 1000 / 60) % 60);
                const s = Math.floor((diff / 1000) % 60);

                document.getElementById('timer').innerHTML = 
                    `<b>${d} Gün, ${h} Saat, ${m} Dakika, ${s} Saniye</b>Boyunca hayatımın en güzel anlamı oldun.`;
                
                requestAnimationFrame(update);
            }
            update();
        }

        // Şifre Kontrolü
        passInput.addEventListener('input', () => {
            if (passInput.value === "04012026") {
                passwordScreen.style.opacity = '0';
                setTimeout(() => {
                    passwordScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    mainContent.classList.add('show');
                    startRelationshipTimer();
                }, 800);
            }
        });
    </script>
</body>
</html>
