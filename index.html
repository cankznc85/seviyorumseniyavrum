<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeynep için 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #001f3f; /* Koyu Lacivert */
            color: #ffffff; /* Beyaz Yazılar */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        /* Lacivert Arka Plan Işıltısı */
        .bg-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #003366 0%, #001f3f 80%);
            z-index: -1;
        }

        /* 1. EKRAN: ŞİFRE (🔒) */
        #password-screen { 
            text-align: center; transition: all 0.8s ease; z-index: 20; 
            padding: 20px;
        }
        .lock-icon { font-size: 4rem; margin-bottom: 25px; filter: drop-shadow(0 0 10px #ff69b4); }
        
        input {
            background: rgba(255, 255, 255, 0.05); border: 2px solid #ff69b4; /* Pembe Kenarlık */
            padding: 18px; color: #ffffff; border-radius: 20px;
            font-size: 1.5rem; text-align: center; letter-spacing: 6px;
            width: 230px; outline: none; transition: 0.3s;
        }
        input:focus { 
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.4);
            background: rgba(255, 255, 255, 0.1);
        }

        /* 2. EKRAN: ANA İÇERİK */
        #main-content { 
            display: none; text-align: center; 
            padding: 30px 20px; width: 90%; max-width: 450px; 
            z-index: 10; opacity: 0; 
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid rgba(255, 105, 180, 0.3); /* Pembe Detay */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .zeynep-msg { 
            font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: 600; 
            color: #ffffff; line-height: 1.6; margin-bottom: 35px; 
        }
        
        /* Sayaç - Kayma Yapmayan Esnek Yapı */
        #timer { 
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
        }
        .time-box {
            background: rgba(0, 31, 63, 0.6);
            flex: 1; min-width: 75px;
            padding: 15px 5px; border-radius: 15px;
            border: 1px solid rgba(255, 105, 180, 0.2);
        }
        .time-box b { font-size: 1.6rem; display: block; color: #ff69b4; } /* Pembe Sayılar */
        .time-box span { font-size: 0.65rem; color: #ffffff; text-transform: uppercase; opacity: 0.8; }

        /* Zarif Pembe Kalpler */
        .click-heart {
            position: absolute; pointer-events: none;
            animation: ucma 1s ease-out forwards;
            font-size: 24px; z-index: 999;
        }
        @keyframes ucma {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .show { animation: premiumIn 1s ease-out forwards; }
        @keyframes premiumIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body onclick="createHeart(event)">

    <div class="bg-glow"></div>

    <div id="password-screen">
        <div class="lock-icon">🔒</div>
        <input type="password" id="passInput" placeholder="••••" maxlength="8" autocomplete="off">
    </div>

    <div id="main-content">
        <div style="font-size: 3rem; margin-bottom: 15px;">💞</div>
        <div class="zeynep-msg">
            İyi ki varsın yavrum, sadece bugün değil her gün senin günün. Seni çok seviyorum öpüyorum birtanem 💞
        </div>
        <div id="timer">
            <div class="time-box"><b id="days">00</b><span>Gün</span></div>
            <div class="time-box"><b id="hours">00</b><span>Saat</span></div>
            <div class="time-box"><b id="minutes">00</b><span>Dk</span></div>
            <div class="time-box"><b id="seconds">00</b><span>Sn</span></div>
        </div>
    </div>

    <script>
        const passwordScreen = document.getElementById('password-screen');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');

        function createHeart(e) {
            if (mainContent.style.display === 'block') {
                const heart = document.createElement('div');
                heart.className = 'click-heart';
                heart.innerHTML = '💗';
                heart.style.left = (e.clientX - 12) + 'px';
                heart.style.top = (e.clientY - 12) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }

        function startRelationshipTimer() {
            const relStart = new Date(2026, 0, 4, 0, 0, 0); 
            const elDays = document.getElementById('days');
            const elHours = document.getElementById('hours');
            const elMinutes = document.getElementById('minutes');
            const elSeconds = document.getElementById('seconds');
            
            function update() {
                const now = new Date();
                const diff = now - relStart;
                
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / 1000 / 60) % 60);
                const s = Math.floor((diff / 1000) % 60);

                elDays.innerText = d.toString().padStart(2, '0');
                elHours.innerText = h.toString().padStart(2, '0');
                elMinutes.innerText = m.toString().padStart(2, '0');
                elSeconds.innerText = s.toString().padStart(2, '0');
                
                requestAnimationFrame(update);
            }
            update();
        }

        passInput.addEventListener('input', () => {
            if (passInput.value === "04012026") {
                passwordScreen.style.opacity = '0';
                setTimeout(() => {
                    passwordScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    mainContent.classList.add('show');
                    startRelationshipTimer();
                }, 800);
            }
        });
    </script>
</body>
</html>
