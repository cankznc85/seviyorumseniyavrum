<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeynep 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --soft-pink: #ffb7ce; --bg-dark: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: #ffffff; overflow: hidden; touch-action: none; }

        #audio-panel { position: fixed; top: 20px; right: 20px; background: rgba(255, 183, 206, 0.15); padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 183, 206, 0.3); z-index: 20000; }
        #volume-slider { width: 60px; accent-color: var(--soft-pink); cursor: pointer; }

        #wrapper { height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #password-screen { position: absolute; text-align: center; z-index: 15000; transition: 1s; }
        input[type="password"] { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--soft-pink); padding: 15px; color: #ffffff; border-radius: 15px; font-size: 1.5rem; text-align: center; letter-spacing: 5px; width: 200px; outline: none; }

        #main-content { display: none; text-align: center; padding: 35px 25px; width: 90%; max-width: 400px; opacity: 0; background: rgba(20, 20, 20, 0.85); border-radius: 30px; border: 1px solid rgba(255, 183, 206, 0.3); backdrop-filter: blur(15px); transition: 1.5s; z-index: 5000; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-text { font-size: 1.8rem; font-weight: 800; color: var(--soft-pink); margin-bottom: 15px; letter-spacing: 1px; }

        .main-msg { margin-bottom: 25px; font-weight: 300; font-size: 0.95rem; line-height: 1.7; color: #f0f0f0; }

        #timer { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .time-box { background: rgba(255, 183, 206, 0.15); padding: 12px 8px; border-radius: 12px; min-width: 65px; border: 1px solid rgba(255, 183, 206, 0.1); }
        .time-box b { font-size: 1.2rem; display: block; color: var(--soft-pink); }
        .time-box span { font-size: 9px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }

        /* DİNAMİK FOTOĞRAF POPUP */
        #photo-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); 
            background: #000; padding: 8px; border-radius: 15px; border: 2px solid var(--soft-pink); 
            z-index: 30000; opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 35px rgba(255, 183, 206, 0.5); 
        }
        #photo-popup.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        
        .fixed-size { width: 250px !important; height: 250px !important; }
        .auto-size { width: auto !important; height: auto !important; max-width: 85vw; max-height: 70vh; }

        #popup-img { width: 100%; height: 100%; border-radius: 10px; display: none; object-fit: cover; }
        .auto-size #popup-img { object-fit: contain; width: auto; height: auto; max-width: 100%; max-height: 100%; }

        .floating-item { position: absolute; color: var(--soft-pink); font-weight: 300; z-index: 10000; opacity: 0; animation: fadeMove 5s ease-in-out forwards; white-space: nowrap; pointer-events: auto; }
        .letter-item { cursor: pointer; font-size: 2.5rem; filter: drop-shadow(0 0 12px var(--soft-pink)); z-index: 11000; }
        
        @keyframes fadeMove { 
            0% { opacity: 0; transform: translateY(30px) scale(0.85); } 
            25% { opacity: 0.7; } 
            75% { opacity: 0.7; } 
            100% { opacity: 0; transform: translateY(-150px) scale(1.1); } 
        }

        .click-heart { position: absolute; pointer-events: none; color: var(--soft-pink); font-size: 24px; z-index: 25000; animation: heartAnim 0.8s ease-out forwards; }
        @keyframes heartAnim { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5) translateY(-180px); opacity: 0; } }
    </style>
</head>
<body onclick="handleGlobalInteraction(event)" ontouchstart="handleGlobalInteraction(event)">

    <audio id="bgMusic" loop preload="auto"><source src="sarki.mp3" type="audio/mpeg"></audio>

    <div id="audio-panel">
        <span>🎵</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.50">
    </div>

    <div id="wrapper">
        <div id="password-screen">
            <div style="font-size: 3.5rem; margin-bottom:20px;">🔒</div>
            <input type="password" id="passInput" placeholder="••••" maxlength="8" inputmode="numeric">
        </div>

        <div id="main-content">
            <div class="header-text">Yavrum....</div>
            <p class="main-msg">
                Seni çok seviyorum yavrum inan bana, ben sana inanıyorum her zaman mutlu olacağız seninle birtanem benim. Bazen kırılsak da her zaman beraberiz ve her zaman beraber olacağız birbirimizi yeniden iyileştiriyoruz seviyorum seni.
            </p>
            <div id="timer">
                <div class="time-box"><b id="days">00</b><span>Gün</span></div>
                <div class="time-box"><b id="hours">00</b><span>Saat</span></div>
                <div class="time-box"><b id="minutes">00</b><span>Dk</span></div>
                <div class="time-box"><b id="seconds">00</b><span>Sn</span></div>
            </div>
        </div>
    </div>

    <div id="photo-popup">
        <img src="" id="popup-img" alt="Fotoğraf">
    </div>

    <script>
        const song = document.getElementById('bgMusic');
        const volSlider = document.getElementById('volume-slider');
        const popup = document.getElementById('photo-popup');
        const popupImg = document.getElementById('popup-img');
        let isStarted = false;

        function handleGlobalInteraction(e) {
            if (!isStarted) {
                song.volume = volSlider.value;
                song.play().then(() => { isStarted = true; }).catch(() => {});
            }
            if (popup.classList.contains('active') && !e.target.classList.contains('letter-item')) {
                popup.classList.remove('active');
            }
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            if(x && y) spawnHeart(x, y);
        }

        volSlider.onclick = (e) => e.stopPropagation();

        function spawnHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '🤍';
            heart.style.left = (x - 12) + 'px';
            heart.style.top = (y - 12) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        document.getElementById('passInput').addEventListener('input', function() {
            if (this.value === "04012026") {
                document.getElementById('password-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('password-screen').style.display = 'none';
                    const main = document.getElementById('main-content');
                    main.style.display = 'block';
                    setTimeout(() => main.style.opacity = '1', 50);
                    startExperience();
                }, 1000);
            }
        });

        function startExperience() {
            const startDate = new Date(2026, 0, 4); 
            setInterval(() => {
                const diff = new Date() - startDate;
                document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                document.getElementById('minutes').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }, 1000);

            const words = ["Yavrum", "Birtanem", "Her şeyim", "Eşşek :)", "Seni Seviyorum"];

            setInterval(() => createFloatingItem(words[Math.floor(Math.random() * words.length)], false), 2500);
            setInterval(() => createFloatingItem('✉️', true), 8000);

            function createFloatingItem(content, isLetter) {
                const item = document.createElement('div');
                item.className = 'floating-item' + (isLetter ? ' letter-item' : '');
                item.innerHTML = content;
                item.style.left = (Math.random() * 70 + 15) + '%';
                item.style.top = (Math.random() * 60 + 20) + '%';
                
                if (isLetter) {
                    item.onclick = (e) => {
                        e.stopPropagation();
                        let selectedIdx;
                        let chance = Math.random();
                        
                        if (chance < 0.80) {
                            selectedIdx = Math.random() < 0.5 ? 3 : 4;
                        } else {
                            const others = [1, 2, 5, 6, 7];
                            selectedIdx = others[Math.floor(Math.random() * others.length)];
                        }

                        if (selectedIdx === 3 || selectedIdx === 4) {
                            popup.className = 'active fixed-size';
                        } else {
                            popup.className = 'active auto-size';
                        }

                        popupImg.src = `cocukluk${selectedIdx}.jpg`; 
                        popupImg.onload = () => {
                            popupImg.style.display = 'block';
                        };
                        item.remove();
                    };
                }
                document.body.appendChild(item);
                setTimeout(() => { if(item) item.remove(); }, 5000);
            }
        }
    </script>
</body>
</html>
