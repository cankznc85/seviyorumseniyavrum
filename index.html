<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeynep 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffb7ce; 
            --bg-dark: #0a0a0a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark); color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        /* SES PANELİ */
        #audio-panel {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 183, 206, 0.15);
            padding: 8px 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 183, 206, 0.3);
            z-index: 2000;
        }
        
        #volume-slider { width: 70px; accent-color: var(--soft-pink); cursor: pointer; }

        /* HAYALET KELİMELER (HIZLANDIRILDI) */
        .floating-word {
            position: absolute; color: var(--soft-pink);
            font-weight: 300; pointer-events: none; z-index: 1;
            font-size: 1.1rem; opacity: 0;
            animation: wordFade 3.5s ease-in-out forwards; /* 5s -> 3.5s yapıldı */
        }
        @keyframes wordFade {
            0% { opacity: 0; transform: translateY(10px) scale(0.9); }
            30% { opacity: 0.5; }
            70% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-50px) scale(1.1); }
        }

        /* EKRANLAR */
        #password-screen { text-align: center; transition: 1s; z-index: 100; }
        input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--soft-pink);
            padding: 12px; color: #ffffff; border-radius: 12px;
            font-size: 1.2rem; text-align: center; letter-spacing: 5px;
            width: 180px; outline: none;
        }

        #main-content { 
            display: none; text-align: center; padding: 30px 20px; 
            width: 90%; max-width: 400px; z-index: 50; opacity: 0; 
            background: rgba(255, 255, 255, 0.02); border-radius: 25px;
            border: 1px solid rgba(255, 183, 206, 0.2);
            backdrop-filter: blur(15px);
        }

        .header-text { font-size: 1.8rem; font-weight: 800; color: var(--soft-pink); margin-bottom: 20px; }

        /* SAYAÇ */
        #timer { display: flex; justify-content: center; gap: 10px; }
        .time-box {
            background: rgba(255, 183, 206, 0.1); padding: 12px 10px; 
            border-radius: 12px; min-width: 65px;
        }
        .time-box b { font-size: 1.2rem; display: block; color: var(--soft-pink); }
        .time-box span { font-size: 9px; text-transform: uppercase; opacity: 0.6; }

        /* GÖRSELLEŞTİRİCİ */
        #visualizer-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 50px; display: flex; align-items: flex-end;
            justify-content: center; gap: 3px; pointer-events: none; z-index: 5;
        }
        .bar { width: 4px; background: var(--soft-pink); border-radius: 2px 2px 0 0; opacity: 0.4; }

        .click-heart {
            position: absolute; pointer-events: none;
            color: var(--soft-pink); font-size: 20px; z-index: 1000;
            animation: heartAnim 1s ease-out forwards;
        }
        @keyframes heartAnim {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body onclick="forceMusic()">

    <audio id="bgMusic" loop preload="auto">
        <source src="sarki.mp3" type="audio/mpeg">
    </audio>

    <div id="audio-panel">
        <span style="font-size:12px">🎵</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.50">
    </div>

    <div id="password-screen">
        <div style="font-size: 2.5rem; margin-bottom:20px;">🔒</div>
        <input type="password" id="passInput" placeholder="••••" maxlength="8" inputmode="numeric">
    </div>

    <div id="main-content">
        <div class="header-text">Yavrum....</div>
        <p style="margin-bottom:30px; font-weight: 300; font-size: 0.95rem; opacity: 0.9;">
            İyi ki varsın yavrum, sadece bugün değil her gün senin günün. Seni çok seviyorum öpüyorum birtanem 💞
        </p>
        <div id="timer">
            <div class="time-box"><b id="days">00</b><span>Gün</span></div>
            <div class="time-box"><b id="hours">00</b><span>Saat</span></div>
            <div class="time-box"><b id="minutes">00</b><span>Dk</span></div>
            <div class="time-box"><b id="seconds">00</b><span>Sn</span></div>
        </div>
    </div>

    <div id="visualizer-container"></div>

    <script>
        const song = document.getElementById('bgMusic');
        const volSlider = document.getElementById('volume-slider');
        let isMusicPlaying = false;

        // Müzik için Garanti Fonksiyon
        function forceMusic() {
            if (!isMusicPlaying) {
                song.volume = volSlider.value;
                song.play().then(() => {
                    isMusicPlaying = true;
                    // Eğer 1. dakikadan başlamasını istiyorsan:
                    // song.currentTime = 60; 
                }).catch(err => console.log("Müzik başlatılamadı, etkileşim bekleniyor."));
            }
        }

        volSlider.addEventListener('input', (e) => { song.volume = e.target.value; });

        // Kalp Efekti
        window.addEventListener('mousedown', (e) => spawnHeart(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => spawnHeart(e.touches[0].clientX, e.touches[0].clientY));

        function spawnHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '🤍';
            heart.style.left = x + 'px'; heart.style.top = y + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        // Şifre Kontrolü
        const passInput = document.getElementById('passInput');
        passInput.addEventListener('input', () => {
            if (passInput.value === "04012026") {
                document.getElementById('password-screen').style.display = 'none';
                const main = document.getElementById('main-content');
                main.style.display = 'block';
                setTimeout(() => main.style.opacity = '1', 50);
                initSite();
            }
        });

        function initSite() {
            // Sayaç
            const relStart = new Date(2026, 0, 4);
            setInterval(() => {
                const diff = new Date() - relStart;
                document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                document.getElementById('minutes').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }, 1000);

            // Hayalet Kelimeler (Hızlandırıldı ve "Ömrüm" çıkarıldı)
            const words = ["Yavrum", "Birtanem", "Her şeyim", "Aşkım", "Seni Seviyorum", "Eşşek :)"];
            setInterval(() => {
                const w = document.createElement('div');
                w.className = 'floating-word';
                w.innerText = words[Math.floor(Math.random() * words.length)];
                w.style.left = Math.random() * 80 + 10 + '%';
                w.style.top = Math.random() * 80 + 10 + '%';
                document.body.appendChild(w);
                setTimeout(() => w.remove(), 3500);
            }, 1000); // Kelime çıkma sıklığı da artırıldı

            // Visualizer
            const container = document.getElementById('visualizer-container');
            for(let i=0; i<30; i++) {
                const b = document.createElement('div');
                b.className = 'bar';
                b.style.height = '2px';
                container.appendChild(b);
            }
            
            setInterval(() => {
                document.querySelectorAll('.bar').forEach(bar => {
                    const h = isMusicPlaying ? Math.random() * 40 + 5 : 2;
                    bar.style.height = h + 'px';
                });
            }, 100);
        }
    </script>
</body>
</html>
