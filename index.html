<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeynep 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #050505; 
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
        }

        /* ARKA PLAN KELİME ANİMASYONU */
        .floating-word {
            position: absolute;
            color: rgba(255, 255, 255, 0.08); /* Çok silik, hayalet gibi */
            font-weight: 600;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
            animation: floatAnim 8s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-40px); }
        }

        /* EKRANLAR */
        #password-screen { text-align: center; transition: all 0.8s ease; z-index: 20; padding: 20px; }
        .lock-icon { font-size: 3.5rem; margin-bottom: 25px; filter: drop-shadow(0 0 10px #ff69b4); }
        
        input {
            background: rgba(255, 255, 255, 0.02); border: 2.2px solid rgba(255, 105, 180, 0.4);
            padding: 15px; color: #ffffff; border-radius: 15px;
            font-size: 1.4rem; text-align: center; letter-spacing: 6px;
            width: 220px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #ff69b4; box-shadow: 0 0 25px rgba(255, 105, 180, 0.3); }

        #celebration-screen {
            display: none; position: absolute; text-align: center;
            width: 100%; padding: 20px; z-index: 30;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .celeb-text { font-size: clamp(1.8rem, 8vw, 3rem); font-weight: 800; }
        .celeb-text span { color: #ff69b4; text-shadow: 0 0 20px rgba(255, 105, 180, 0.5); }

        #main-content { 
            display: none; text-align: center; 
            padding: 40px 20px; width: 92%; max-width: 500px; 
            z-index: 10; opacity: 0; 
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .header-text {
            font-size: 1.8rem; font-weight: 800; color: #ff69b4;
            margin-bottom: 25px; letter-spacing: 1px;
        }

        .zeynep-msg { font-size: clamp(1.1rem, 4.5vw, 1.5rem); font-weight: 300; line-height: 1.6; margin-bottom: 35px; }
        
        #timer { display: flex; justify-content: space-between; gap: 8px; }
        .time-box {
            background: rgba(0, 0, 0, 0.5);
            flex: 1; padding: 15px 2px; border-radius: 12px;
            border: 1px solid rgba(255, 105, 180, 0.1);
        }
        .time-box b { font-size: 1.4rem; display: block; color: #ff69b4; }
        .time-box span { font-size: 0.55rem; color: #ffffff; text-transform: uppercase; opacity: 0.8; }

        .click-heart {
            position: absolute; pointer-events: none;
            animation: moveUp 1s ease-out forwards;
            font-size: 24px; z-index: 999;
        }
        @keyframes moveUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .fade-in { animation: fadeInAnim 1s ease-out forwards; }
        @keyframes fadeInAnim { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="password-screen">
        <div class="lock-icon">🔒</div>
        <input type="password" id="passInput" placeholder="••••" maxlength="8" autocomplete="off">
    </div>

    <div id="celebration-screen">
        <div class="celeb-text">KADINLAR GÜNÜN<br><span>KUTLU OLSUN</span></div>
    </div>

    <div id="main-content">
        <div class="header-text">Zeynep Birtanem</div>
        <div class="zeynep-msg">
            İyi ki varsın yavrum, sadece bugün değil her gün senin günün. Seni çok seviyorum öpüyorum birtanem 💞
        </div>
        <div id="timer">
            <div class="time-box"><b id="days">00</b><span>Gün</span></div>
            <div class="time-box"><b id="hours">00</b><span>Saat</span></div>
            <div class="time-box"><b id="minutes">00</b><span>Dakika</span></div>
            <div class="time-box"><b id="seconds">00</b><span>Saniye</span></div>
        </div>
    </div>

    <script>
        const words = ["Yavrum", "Birtanem", "Her şeyim", "Aşkım", "Seni çok seviyorum", "Eşşek"];
        const bgLayer = document.getElementById('bg-layer');

        // Arka plan kelimelerini oluşturma
        function createFloatingWord() {
            if (mainContent.style.display !== 'block') return;
            const word = document.createElement('div');
            word.className = 'floating-word';
            word.innerText = words[Math.floor(Math.random() * words.length)];
            word.style.left = Math.random() * 80 + 10 + '%';
            word.style.top = Math.random() * 80 + 10 + '%';
            word.style.fontSize = Math.random() * 0.5 + 0.8 + 'rem';
            bgLayer.appendChild(word);
            setTimeout(() => word.remove(), 8000);
        }

        const passwordScreen = document.getElementById('password-screen');
        const celebScreen = document.getElementById('celebration-screen');
        const mainContent = document.getElementById('main-content');
        const passInput = document.getElementById('passInput');
        const hearts = ['💗', '💖', '💕', '❤️'];

        function spawnHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = (x - 12) + 'px';
            heart.style.top = (y - 12) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        const handleInteraction = (e) => {
            if (mainContent.style.display === 'block') {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                spawnHeart(x, y);
            }
        };

        window.addEventListener('mousedown', () => window.isMouseDown = true);
        window.addEventListener('mouseup', () => window.isMouseDown = false);
        window.addEventListener('mousemove', (e) => window.isMouseDown && handleInteraction(e));
        window.addEventListener('touchstart', handleInteraction);
        window.addEventListener('touchmove', (e) => { if(mainContent.style.display === 'block') e.preventDefault(); handleInteraction(e); }, { passive: false });

        function startRelationshipTimer() {
            const relStart = new Date(2026, 0, 4, 0, 0, 0); 
            const elements = { d: document.getElementById('days'), h: document.getElementById('hours'), m: document.getElementById('minutes'), s: document.getElementById('seconds') };
            function update() {
                const now = new Date();
                const diff = now - relStart;
                elements.d.innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                elements.h.innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                elements.m.innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                elements.s.innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                requestAnimationFrame(update);
            } update();
            // Kelime akışını başlat
            setInterval(createFloatingWord, 2000);
        }

        passInput.addEventListener('input', () => {
            if (passInput.value === "04012026") {
                passwordScreen.style.opacity = '0';
                setTimeout(() => {
                    passwordScreen.style.display = 'none';
                    celebScreen.style.display = 'block';
                    setTimeout(() => { celebScreen.style.opacity = '1'; }, 50);
                    setTimeout(() => {
                        celebScreen.style.opacity = '0';
                        setTimeout(() => {
                            celebScreen.style.display = 'none';
                            mainContent.style.display = 'block';
                            mainContent.classList.add('fade-in');
                            startRelationshipTimer();
                        }, 800);
                    }, 2500);
                }, 800);
            }
        });
    </script>
</body>
</html>
