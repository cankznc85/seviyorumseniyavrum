<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeynep 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --soft-pink: #ffb7ce; --bg-dark: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: #ffffff; overflow: hidden; touch-action: none; }

        /* SES PANELİ */
        #audio-panel { position: fixed; top: 20px; right: 20px; background: rgba(255, 183, 206, 0.15); padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 183, 206, 0.3); z-index: 2000; }
        #volume-slider { width: 70px; accent-color: var(--soft-pink); cursor: pointer; }

        /* HAYALET YAZILAR VE MEKTUPLAR */
        .floating-item { position: absolute; color: var(--soft-pink); font-weight: 300; z-index: 1; font-size: 1.1rem; opacity: 0; animation: fadeMove 4s ease-in-out forwards; pointer-events: auto; }
        .letter-item { cursor: pointer; font-size: 1.5rem; filter: drop-shadow(0 0 10px var(--soft-pink)); z-index: 2; }
        
        @keyframes fadeMove {
            0% { opacity: 0; transform: translateY(20px) scale(0.8); }
            30% { opacity: 0.6; }
            70% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-60px) scale(1.1); }
        }

        /* İLTİFAT POPUP */
        #compliment-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(255, 183, 206, 0.2); backdrop-filter: blur(20px); padding: 20px; border-radius: 20px; border: 1px solid var(--soft-pink); color: #fff; text-align: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #compliment-popup.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }

        /* ANA İÇERİK */
        #password-screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: 1s; }
        input { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--soft-pink); padding: 12px; color: #ffffff; border-radius: 12px; font-size: 1.2rem; text-align: center; letter-spacing: 5px; width: 180px; outline: none; }

        #main-content { display: none; text-align: center; padding: 30px 20px; width: 90%; max-width: 400px; position: relative; z-index: 50; opacity: 0; background: rgba(255, 255, 255, 0.02); border-radius: 25px; border: 1px solid rgba(255, 183, 206, 0.2); backdrop-filter: blur(15px); transition: 1s; margin: auto; }
        .header-text { font-size: 1.8rem; font-weight: 800; color: var(--soft-pink); margin-bottom: 20px; }

        /* SAYAÇ */
        #timer { display: flex; justify-content: center; gap: 8px; }
        .time-box { background: rgba(255, 183, 206, 0.1); padding: 10px; border-radius: 12px; min-width: 60px; }
        .time-box b { font-size: 1.1rem; display: block; color: var(--soft-pink); }
        .time-box span { font-size: 8px; text-transform: uppercase; opacity: 0.6; }

        /* KALP EFEKTİ */
        .click-heart { position: absolute; pointer-events: none; color: var(--soft-pink); font-size: 22px; z-index: 9999; animation: heartAnim 1s ease-out forwards; }
        @keyframes heartAnim { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5) translateY(-120px); opacity: 0; } }
    </style>
</head>
<body onclick="forceMusic()">

    <audio id="bgMusic" loop preload="auto"><source src="sarki.mp3" type="audio/mpeg"></audio>

    <div id="audio-panel">
        <span>🎵</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.50">
    </div>

    <div id="password-screen">
        <div style="font-size: 3rem; margin-bottom:20px; filter: drop-shadow(0 0 15px var(--soft-pink));">🔒</div>
        <input type="password" id="passInput" placeholder="••••" maxlength="8" inputmode="numeric">
    </div>

    <div id="compliment-popup">Gülüşüne kurban olurum! ❤️</div>

    <div id="main-content">
        <div class="header-text">Yavrum....</div>
        <p style="margin-bottom:30px; font-weight: 300; font-size: 0.9rem; opacity: 0.9; line-height: 1.6;">
            İyi ki varsın yavrum, sadece bugün değil her gün senin günün. Seni çok seviyorum öpüyorum birtanem 💞
        </p>
        <div id="timer">
            <div class="time-box"><b id="days">00</b><span>Gün</span></div>
            <div class="time-box"><b id="hours">00</b><span>Saat</span></div>
            <div class="time-box"><b id="minutes">00</b><span>Dk</span></div>
            <div class="time-box"><b id="seconds">00</b><span>Sn</span></div>
        </div>
    </div>

    <script>
        const song = document.getElementById('bgMusic');
        const volSlider = document.getElementById('volume-slider');
        let isMusicPlaying = false;

        function forceMusic() {
            if (!isMusicPlaying) {
                song.volume = volSlider.value;
                song.play().then(() => { isMusicPlaying = true; }).catch(() => {});
            }
        }

        volSlider.oninput = (e) => { song.volume = e.target.value; };

        // KALBİ HER YERDE TAKİP ETME (FIXED)
        function spawnHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'click-heart';
            heart.innerHTML = '🤍';
            heart.style.left = (x - 10) + 'px';
            heart.style.top = (y - 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        document.addEventListener('mousemove', (e) => { if (e.buttons > 0) spawnHeart(e.clientX, e.clientY); });
        document.addEventListener('touchmove', (e) => { spawnHeart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
        document.addEventListener('mousedown', (e) => spawnHeart(e.clientX, e.clientY));

        // ŞİFRE VE GEÇİŞ
        document.getElementById('passInput').addEventListener('input', function() {
            if (this.value === "04012026") {
                document.getElementById('password-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('password-screen').style.display = 'none';
                    const main = document.getElementById('main-content');
                    main.style.display = 'block';
                    setTimeout(() => main.style.opacity = '1', 50);
                    initSite();
                }, 1000);
            }
        });

        function initSite() {
            // SAYAÇ (04.01.2026'ya göre)
            const relStart = new Date(2026, 0, 4);
            setInterval(() => {
                const diff = new Date() - relStart;
                document.getElementById('days').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                document.getElementById('minutes').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }, 1000);

            // HAYALET YAZILAR VE MEKTUPLAR
            const words = ["Yavrum", "Birtanem", "Her şeyim", "Aşkım", "Seni Seviyorum", "Eşşek :)"];
            const compliments = [
                "Gülüşüne kurban olurum! ❤️",
                "Dünyanın en güzel kalbi sende...",
                "Bakışların ömre bedel yavrum.",
                "Sen benim en güzel dualarımsın.",
                "İyi ki benimlesin, her şeyim."
            ];

            // Kelime üretici (Her 1.5 saniyede)
            setInterval(() => {
                createFloatingItem(words[Math.floor(Math.random() * words.length)], false);
            }, 1500);

            // Mektup üretici (Her 8-9 saniyede)
            setInterval(() => {
                createFloatingItem('✉️', true);
            }, 8500);

            function createFloatingItem(content, isLetter) {
                const item = document.createElement('div');
                item.className = 'floating-item' + (isLetter ? ' letter-item' : '');
                item.innerHTML = content;
                item.style.left = (Math.random() * 80 + 10) + '%';
                item.style.top = (Math.random() * 70 + 15) + '%';
                
                if (isLetter) {
                    item.onclick = (e) => {
                        e.stopPropagation();
                        const popup = document.getElementById('compliment-popup');
                        popup.innerText = compliments[Math.floor(Math.random() * compliments.length)];
                        popup.classList.add('active');
                        setTimeout(() => popup.classList.remove('active'), 2500);
                        item.remove();
                    };
                }
                
                document.body.appendChild(item);
                setTimeout(() => item.remove(), 4000);
            }
        }
    </script>
</body>
</html>
